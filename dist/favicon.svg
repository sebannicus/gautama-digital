<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fondo -->
  <rect width="32" height="32" rx="8" fill="#06060F"/>
  <!-- Letra G estilizada en dorado -->
  <text
    x="50%"
    y="50%"
    dominant-baseline="central"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="20"
    font-weight="bold"
    fill="#C9A84C"
  >G</text>
  <!-- Punto dorado en esquina inferior derecha -->
  <circle cx="25" cy="25" r="3" fill="#C9A84C"/>
</svg>
